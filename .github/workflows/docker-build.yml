name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
    paths:
      - '.github/workflows/docker-build.yml'
      - 'src/**'
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/docker-build.yml'
      - 'src/**'
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  REGISTRY: harbor.imassage.me
  IMAGE_NAME: erato/web-search-mcp
  SHA_TAG: ${{ github.sha }}
  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

jobs:
  lint-dockerfile:
    timeout-minutes: 10
    name: "lint dockerfile"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: "Lint Dockerfile"
        uses: jbergstroem/hadolint-gh-action@v1.12.2
        with:
          dockerfile: Dockerfile

#  cargo-clippy:
#    runs-on: ubuntu-22.04
#    name: "cargo clippy"
#    steps:
#      - uses: actions/checkout@v4
#
#      - name: "Install Rust toolchain"
#        run: rustup component add clippy
#
#      - uses: Swatinem/rust-cache@v2
#        with:
#          cache-all-crates: "true"
#
#      - name: "Clippy"
#        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    runs-on: ubuntu-22.04
    name: "test"
    steps:
      - uses: actions/checkout@v4

      - name: "Install Rust toolchain"
        run: cargo --help

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"

      - name: "Run tests"
        run: cargo test --all-features

  build-and-push-amd64:
    runs-on: ubuntu-22.04
    needs: [lint-dockerfile, test]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }}-amd64
            ${{ env.RELEASE_VERSION != '' && format('{0}/{1}:{2}-amd64', env.REGISTRY, env.IMAGE_NAME, env.RELEASE_VERSION) || '' }}

  build-and-push-arm64:
    runs-on: ubuntu-22.04
    needs: [lint-dockerfile, test]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }}-arm64
            ${{ env.RELEASE_VERSION != '' && format('{0}/{1}:{2}-arm64', env.REGISTRY, env.IMAGE_NAME, env.RELEASE_VERSION) || '' }}

  create-manifests:
    needs: [build-and-push-amd64, build-and-push-arm64]
    runs-on: ubuntu-22.04
    steps:
      - name: Log in to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifests
        run: |
          # Create multi-arch manifest for latest
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64

          # Create multi-arch manifest for SHA
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }}-arm64

          # Create multi-arch manifest for release version (if tagged)
          if [[ "${{ env.RELEASE_VERSION }}" != "" ]]; then
            docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}-amd64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}-arm64
          fi

  create-github-release:
    needs: [create-manifests]
    runs-on: ubuntu-22.04
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release notes
        id: generate_notes
        run: |
          NOTES="## Web Search MCP - Release ${{ github.ref_name }}

          ### Docker Image

          Pull the Docker image for this release:

          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          \`\`\`

          Multi-architecture support: amd64, arm64

          ### Changes

          See the commit history for details on what changed in this release.

          ### Registry Information

          - **Registry**: ${{ env.REGISTRY }}
          - **Image**: ${{ env.IMAGE_NAME }}
          - **Tag**: ${{ github.ref_name }}
          "

          # Using a delimiter for multiline output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.generate_notes.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
